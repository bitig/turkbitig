<script>
const fp_fontFamilies = [
  "tbldamga", "tbldamga2", "bilgekaganyenib", "bala", "balab",
  "gokturkkalem", "gokturkkalemg", "bediz", "cizgi", "damgaregular",
  "damgab", "damgabb", "damgagenisbold", "gokturkyeni", "gokturkyenib",
  "kirgiz", "koncuy", "kultigin", "kultiginbold", "damgaroman",
  "tatarbold", "tonyukuk", "tonyukukbold", "turkbitig", "turkbitigbold",
  "uygur", "yaksi", "yaksib", "karluk", "irkbitig"
];

let fp_currentFont = fp_fontFamilies[0];

const fp_fontNames = {
  "tbldamga": "Altyazılı", "tbldamga2": "Öğrenci için",
  "bilgekaganyenib": "Bilge Kağan", "bala": "Bala",
  "balab": "Bala(K)", "bediz": "Bediz", "cizgi": "Çizgi",
  "damgaregular": "Damga", "damgab": "Damga(K)",
  "damgabb": "Damga(A)", "damgagenisbold": "Damga(GB)",
  "gokturkyeni": "Göktürk Kurgu", "gokturkyenib": "Göktürk Kurgu(K)",
  "gokturkkalem": "Kalem", "gokturkkalemg": "Kalem(G)",
  "kirgiz": "Kırgız", "koncuy": "Konçuy",
  "kultigin": "Kültiğin", "kultiginbold": "Kültiğin(K)",
  "damgaroman": "Roman", "tatarbold": "Tatar",
  "tonyukuk": "Tonyukuk", "tonyukukbold": "Tonyukuk (K)",
  "turkbitig": "Türk Bitig", "turkbitigbold": "Türk Bitig(K)",
  "uygur": "Uygur", "yaksi": "Yakşı", "yaksib": "Yakşı(K)",
  "karluk": "Karluk", "irkbitig": "Irk Bitig"
};

const fp_btnPrev = document.getElementById("fpBtnPrev");
const fp_btnCurr = document.getElementById("fpBtnCurr");
const fp_btnNext = document.getElementById("fpBtnNext");
const fp_btnUp   = document.getElementById("fpBtnUp");
const fp_btnDown = document.getElementById("fpBtnDown");
const fp_btnReset = document.getElementById("fpBtnReset");

let fp_currentIdx = fp_fontFamilies.indexOf(fp_currentFont);
if (fp_currentIdx < 0) fp_currentIdx = 0;

function fp_wrap(i) {
  const len = fp_fontFamilies.length;
  if (i < 0) return len - 1;
  if (i >= len) return 0;
  return i;
}

function fp_refresh() {
  fp_currentIdx = fp_wrap(fp_currentIdx);
  fp_currentFont = fp_fontFamilies[fp_currentIdx];

  const prevIdx = fp_wrap(fp_currentIdx - 1);
  const nextIdx = fp_wrap(fp_currentIdx + 1);

  fp_btnPrev.textContent = fp_fontNames[fp_fontFamilies[prevIdx]] || fp_fontFamilies[prevIdx];
  fp_btnCurr.textContent = fp_fontNames[fp_fontFamilies[fp_currentIdx]] || fp_fontFamilies[fp_currentIdx];
  fp_btnNext.textContent = fp_fontNames[fp_fontFamilies[nextIdx]] || fp_fontFamilies[nextIdx];

  fp_updatePreview();
  fp_updateInput();
}

function fp_updatePreview() {
  const el = document.getElementById("gokturk");
  if (el) el.style.fontFamily = fp_currentFont;
}

function fp_updateInput() {
  const inp = document.querySelector('input[name="selectedfont"]');
  if (inp) inp.value = fp_fontNames[fp_currentFont] || fp_currentFont;
}

function fp_attach(btn, step) {
  let to, iv;

  btn.onmousedown = e => {
    if (e.button !== 0) return;
    fp_currentIdx += step; fp_refresh();
    to = setTimeout(() => {
      iv = setInterval(() => { fp_currentIdx += step; fp_refresh(); }, 100);
    }, 350);
  };
  btn.onmouseup = btn.onmouseleave = () => { clearTimeout(to); clearInterval(iv); };

  btn.ontouchend = e => { e.preventDefault(); fp_currentIdx += step; fp_refresh(); };
}

fp_attach(fp_btnPrev, -1);
fp_attach(fp_btnCurr, +1);
fp_attach(fp_btnNext, +1);
fp_attach(fp_btnUp,   -1);
fp_attach(fp_btnDown, +1);

// Reset button
fp_btnReset.onmousedown = fp_btnReset.ontouchend = e => {
  if (e.type === "touchend") e.preventDefault();
  fp_currentIdx = 0;
  fp_refresh();
};

fp_refresh();
</script>
