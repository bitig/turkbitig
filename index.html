<script>
document.addEventListener("DOMContentLoaded", () => {
    const textarea = document.getElementById('gokturk');
    const fontPicker = document.getElementById('fontPicker');
    const radios = document.getElementsByName('textProp');

    const computedStyle = window.getComputedStyle(textarea);
    const defaults = {
        fontSize: parseFloat(computedStyle.fontSize),
        textStroke: 0, 
        letterSpacing: computedStyle.letterSpacing === 'normal' ? 0 : parseFloat(computedStyle.letterSpacing),
        fontIndex: 0
    };

    textarea.style.fontSize = defaults.fontSize + 'px';
    textarea.style.letterSpacing = defaults.letterSpacing + 'px';
    textarea.style.webkitTextStrokeWidth = defaults.textStroke + 'px';
    textarea.style.fontFamily = fontPicker.options[defaults.fontIndex].value;

    function getActiveProperty() {
        for (const radio of radios) {
            if (radio.checked) return radio.value;
        }
    }

    function modifyProperty(direction) {
        const prop = getActiveProperty();
        
        if (prop === 'fontSize') {
            let current = parseFloat(textarea.style.fontSize);
            let next = direction === 'up' ? Math.ceil(current * 1.05) : Math.floor(current / 1.05);
            next = Math.max(12, Math.min(next, 550)); 
            textarea.style.fontSize = next + 'px';
        } 
        else if (prop === 'letterSpacing') {
            let current = parseFloat(textarea.style.letterSpacing) || 0;
            let step = 2; 
            let next = direction === 'up' ? current + step : current - step;
            next = Math.max(-20, Math.min(next, 50));
            textarea.style.letterSpacing = next + 'px';
        } 
        else if (prop === 'textStroke') {
            let current = parseFloat(textarea.style.webkitTextStrokeWidth) || 0;
            let step = 1;
            let next = direction === 'up' ? current + step : current - step;
            next = Math.max(0, Math.min(next, 12));
            textarea.style.webkitTextStrokeWidth = next + 'px';
        }
    }

    function modifyFont(direction) {
        let currentIndex = fontPicker.selectedIndex;
        let maxIndex = fontPicker.options.length - 1;

        if (direction === 'up' && currentIndex > 0) {
            fontPicker.selectedIndex = currentIndex - 1;
        } else if (direction === 'down' && currentIndex < maxIndex) {
            fontPicker.selectedIndex = currentIndex + 1;
        }
        
        textarea.style.fontFamily = fontPicker.value;
    }

    fontPicker.addEventListener('change', (e) => {
        textarea.style.fontFamily = e.target.value;
    });

    document.getElementById('btnSet').addEventListener('click', () => {
        const prop = getActiveProperty();
        textarea.style[prop === 'textStroke' ? 'webkitTextStrokeWidth' : prop] = defaults[prop] + 'px';
    });

    document.getElementById('btnReset').addEventListener('click', () => {
        fontPicker.selectedIndex = defaults.fontIndex;
        textarea.style.fontFamily = fontPicker.value;
    });

    function setupHoldAction(btnId, actionFn) {
        const btn = document.getElementById(btnId);
        let intervalId;
        let timeoutId;

        const startHold = (e) => {
            if (e.type === 'touchstart' && e.cancelable) {
                e.preventDefault(); 
            }
            actionFn(); 
            timeoutId = setTimeout(() => {
                intervalId = setInterval(actionFn, 100); 
            }, 400);
        };

        const endHold = () => {
            clearTimeout(timeoutId);
            clearInterval(intervalId);
        };

        btn.addEventListener('mousedown', startHold);
        btn.addEventListener('mouseup', endHold);
        btn.addEventListener('mouseleave', endHold);
        
        btn.addEventListener('touchstart', startHold, { passive: false });
        btn.addEventListener('touchend', endHold);
        btn.addEventListener('touchcancel', endHold);
    }

    setupHoldAction('btnPlus', () => modifyProperty('up'));
    setupHoldAction('btnMinus', () => modifyProperty('down'));
    setupHoldAction('btnUp', () => modifyFont('up'));
    setupHoldAction('btnDown', () => modifyFont('down'));
});
</script>
