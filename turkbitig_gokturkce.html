    const consonantCount = rightVowelPos - leftVowelPos - 1;
    const isLastSpan = (i === vowelIndices.length - 2);

    if (consonantCount === 0) {
      syllables.push(word.slice(start, leftVowelPos + 1));
      start = leftVowelPos + 1;
    }
    else if (consonantCount >= 2) {
      const splitPos = rightVowelPos - 1;
      syllables.push(word.slice(start, splitPos));
      start = splitPos;
    }
    else {
      let v2HasTrailing = false;

      if (isLastSpan) {
        for (let k = rightVowelPos + 1; k < word.length; k++) {
          if (!VOWELS.includes(word[k]) && !isNeutralConsonant(word[k])) {
            v2HasTrailing = true;
            break;
          }
        }
      } else {
        const nextVowelPos = vowelIndices[i + 2];
        for (let k = rightVowelPos + 1; k < nextVowelPos; k++) {
          if (!VOWELS.includes(word[k]) && !isNeutralConsonant(word[k])) {
            v2HasTrailing = true;
            break;
          }
        }
      }

      const moveRight = !v2HasTrailing && !(startsWithVowel && isOnlySpan);

      if (moveRight) {
        syllables.push(word.slice(start, leftVowelPos + 1));
        start = leftVowelPos + 1;
      } else {
        syllables.push(word.slice(start, rightVowelPos));
        start = rightVowelPos;
      }
    }
  }

  syllables.push(word.slice(start));
  return syllables;
}

function convertSyllable(syllable, map) {
  let out = '';
  let i = 0;
  while (i < syllable.length) {
    const ch = syllable[i];
    out += map[ch] ?? ch;
    i++;
  }
  return out;
}

function processWord(word) {
  const syllables = syllabify(word);
  let out = '';

  for (const syl of syllables) {
    const vowel = [...syl].find(c => VOWELS.includes(c));

    if (!vowel) {
      out += convertSyllable(syl, backVowelMap);
      continue;
    }

    const isBack = 'aıou'.includes(vowel);
    const map = isBack ? backVowelMap : frontVowelMap;
    out += convertSyllable(syl, map);
  }

  return out;
}

function latinToGokturk(input) {
  let text = input
    .replace(/I/g, 'ı')
    .replace(/İ/g, 'i')
    .toLowerCase();

  for (const key of replacementKeys) {
    text = text.split(key).join(replacementMap[key]);
  }

  let result = '';
  let currentWord = '';

  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (convertibleSet.has(ch)) {
      currentWord += ch;
    } else {
      if (currentWord.length > 0) {
        result += processWord(currentWord);
        currentWord = '';
      }
      result += ch;
    }
  }

  if (currentWord.length > 0) {
    result += processWord(currentWord);
  }

  result = result
    // ligatures
    .replace(/[𐰤𐰣][𐰓𐰑𐱃𐱅]/gu, '𐰦')
    .replace(/[𐰞𐰠][𐰓𐰑𐱃𐱅]/gu, '𐰡')
    .replace(/[𐰤𐰣]𐰲/gu, '𐰨')
    .replace(/[𐰤𐰣]𐰖/gu, '𐰪')
    .replace(/(?<!\S)𐰴𐰃/gu, '𐰶𐰃')   
    .replace(/𐰃𐰴/gu, '𐰶')   
    .replace(/(?<!\S)𐰴𐰆/gu, '𐰸𐰆')   
    .replace(/𐰆𐰴/gu, '𐰸')   
    .replace(/𐰇[𐰚𐰜]/gu, '𐰜')

    // vowels
    .replace(/(\S𐰀|𐰀\S)𐰀(?=\S)/gu, '$1')
    .replace(/(\S𐰆|𐰆\S)𐰆(?=\S)/gu, '$1')
    .replace(/(\S𐰃|𐰃\S)𐰃(?=\S)/gu, '$1')
    .replace(/(\S𐰇|𐰇\S)𐰇(?=\S)/gu, '$1')

    // special cases
    .replace(/𐱅𐰼𐰚/gu, '𐱅𐰇𐰼𐰜')
    .replace(/𐱃𐰀𐰭𐰺𐰃/gu, '𐱅𐰭𐰼𐰃')
    .replace(/𐱅𐰀𐰤𐰏𐰼𐰃/gu, '𐱅𐰭𐰼𐰃')
    .replace(/𐱅𐰀𐰭𐰼𐰃/gu, '𐱅𐰭𐰼𐰃')
    .replace(/𐱃𐰀𐰣𐰺𐰃/gu, '𐱅𐰭𐰼𐰃')
    .replace(/[𐱅𐱃]𐰇𐰼[𐰴𐰚𐰶𐰸]/gu, '𐱅𐰇𐰼𐰜');

  return result;
}

document.addEventListener('DOMContentLoaded', () => {

  const gokturkOutput = document.getElementById('gokturk');

  if (latinInput && gokturkOutput) {
    latinInput.addEventListener('input', (e) => {
      gokturkOutput.value = latinToGokturk(e.target.value);
    });

});

<script>

function changeLetterSpacing(action) {
    const element = document.getElementById('gokturk');
    const currentSpacingPx = parseFloat(window.getComputedStyle(element).letterSpacing) || 0;
    const fontSize = parseFloat(window.getComputedStyle(element).fontSize);
    let spacingEm = currentSpacingPx / fontSize;
   
    const increment = 0.02; // in em
    if (action === 'increase') {
        spacingEm = Math.min(0.38, spacingEm + increment);
    } else if (action === 'decrease') {
        spacingEm = Math.max(-0.14, spacingEm - increment);
    }
   
    element.style.letterSpacing = `${spacingEm}em`;
}
function changeSize(action) {
    const element = document.getElementById('gokturk');
    let currentSize = window.getComputedStyle(element).fontSize;
    let sizeNum = parseFloat(currentSize);
    let target;
   
    if (action === 'increase') {
        target = sizeNum * 1.08;
    } else if (action === 'decrease') {
        target = sizeNum * 0.92;
    }
  
    let newSize = Math.round(target / 2) * 2;
   
    if (action === 'increase' && newSize > 800) {
        newSize = 800;
    } else if (action === 'decrease' && newSize < 16) {
        newSize = 14;
    }
   
    element.style.fontSize = `${newSize}px`;
}
function changeFont(fontName) {

}

function changeStrokeSize(action) {
    const element = document.getElementById('gokturk');
    let currentStrokeWidth = window.getComputedStyle(element).webkitTextStrokeWidth || '0px';
    let strokeNum = parseFloat(currentStrokeWidth) || 0;

    element.style.webkitTextStrokeWidth = `${strokeNum}px`;

}

    element.style.webkitTextStrokeColor = color;
    element.style.textStrokeColor = color;
}
function downloadAsPng() {
    const element = document.getElementById('gokturk');
    const selection = window.getSelection();
    let text = '';
    // retrieve text
    if (selection.rangeCount > 0 && element.contains(selection.anchorNode)) {
        text = selection.toString();
    }
    if (!text) {
        text = element.value;
    }
    if (text === '') text = ' ';
    const styles = window.getComputedStyle(element);
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    if (!ctx) {
        console.error('Canvas context not supported');
        return;
    }
    // style properties
    const fontSize = parseFloat(styles.fontSize);
    const strokeWidth = parseFloat(styles.webkitTextStrokeWidth || '0');
    const letterSpacing = parseFloat(styles.letterSpacing) || 0;
    const paddingLeft = parseFloat(styles.paddingLeft) || 0;
    const paddingRight = parseFloat(styles.paddingRight) || 0;
    const paddingTop = parseFloat(styles.paddingTop) || 0;
    const paddingBottom = parseFloat(styles.paddingBottom) || 0;
    const borderLeftWidth = parseFloat(styles.borderLeftWidth) || 0;
    const borderRightWidth = parseFloat(styles.borderRightWidth) || 0;
    const availableWidth = element.offsetWidth - paddingLeft - paddingRight - borderLeftWidth - borderRightWidth;
    ctx.font = `${styles.fontSize} ${styles.fontFamily}`;
    // letter spacing
    function measureTextWithSpacing(text) {
        const graphemes = Array.from(segmenter.segment(text));
        if (graphemes.length === 0) return 0;
        const widths = graphemes.map(g => ctx.measureText(g.segment).width);
        const totalWidth = widths.reduce((sum, w) => sum + w, 0) + letterSpacing * (graphemes.length - 1);
        return totalWidth;
    }
    // newlines
    const explicitLines = text.split('\n');
    let lines = [];
    // blank lines
    for (let explicitLine of explicitLines) {
        const words = explicitLine.split(' ');
        let currentLine = '';
        for (let word of words) {
            if (word === '') continue;
            const testLine = currentLine + (currentLine ? ' ' : '') + word;
            if (measureTextWithSpacing(testLine) <= availableWidth) {
                currentLine = testLine;
            } else {
                if (currentLine) {
                    lines.push(currentLine);
                    currentLine = word;
                } else {
                    // split word
                    let subWord = '';
                    for (let char of word) {
                        const testSubWord = subWord + char;
                        if (measureTextWithSpacing(testSubWord) <= availableWidth) {
                            subWord = testSubWord;
                        } else {
                            lines.push(subWord);
                            subWord = char;
                        }
                    }
                    currentLine = subWord;
                }
            }
        }
        // newlines
        lines.push(currentLine || '');
    }
    // dimensions
    const textMetrics = ctx.measureText(lines[0] || ' ');
    const lineHeight = (textMetrics.actualBoundingBoxAscent + textMetrics.actualBoundingBoxDescent || fontSize) * 1.2;
    const textHeight = lines.length * lineHeight;
    const lineWidths = lines.map(line => measureTextWithSpacing(line));
    const textWidth = Math.max(...lineWidths, 0);
    canvas.width = textWidth + strokeWidth * 2 + paddingLeft + paddingRight;
    canvas.height = textHeight + strokeWidth * 2 + paddingTop + paddingBottom;
    // background
    ctx.fillStyle = styles.backgroundColor || 'transparent';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // text properties
    ctx.font = `${styles.fontSize} ${styles.fontFamily}`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = styles.color;
    if (strokeWidth > 0) {
        ctx.strokeStyle = styles.webkitTextStrokeColor || 'black';
        ctx.lineWidth = strokeWidth;
    }
    // render lines
    const startY = paddingTop + strokeWidth + lineHeight / 2;
    const rightX = canvas.width - paddingRight - strokeWidth;
    lines.forEach((line, index) => {
        const y = startY + index * lineHeight;
        if (line) {
            const graphemes = Array.from(segmenter.segment(line));
            let x = rightX;
            graphemes.forEach((grapheme, i) => {
                const width = ctx.measureText(grapheme.segment).width;
                x -= width;
                if (strokeWidth > 0) {
                    ctx.strokeText(grapheme.segment, x, y);
                }
                ctx.fillText(grapheme.segment, x, y);
                if (i < graphemes.length - 1) {
                    x -= letterSpacing;
                }
            });
        }
    });
    // generate PNG
    try {
        const dataUrl = canvas.toDataURL('image/png');
        if (!dataUrl || dataUrl === 'data:,') {
            console.error('Canvas data URL is empty');
            return;
        }
        const now = new Date().toLocaleTimeString('tr-TR', {
            timeZone: 'Europe/Istanbul',
            hour12: false,
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        });
        const timeString = now.replace(/:/g, '-');
        const fileName = `gokturkce-${timeString}-turkbitig.png`;
        const link = document.createElement('a');
        link.download = fileName;
        link.href = dataUrl;
        link.click();
        console.log('Download triggered successfully');
    } catch (err) {
        console.error('Error generating PNG: ', err);
    }
}

const segmenter = new Intl.Segmenter('en', { granularity: 'grapheme' });
document.getElementById('keyboard').addEventListener('click', function (event) {
  if (event.target.tagName === 'BUTTON') {
    const key = event.target.getAttribute('data-key');
    const output = document.getElementById('gokturk');
    const start = output.selectionStart;
    const end = output.selectionEnd;
    if (key === 'backspace') {
      if (start === end && start > 0) {
        const textBefore = output.value.slice(0, start);
        const segments = Array.from(segmenter.segment(textBefore));
        if (segments.length > 0) {
          const lastSegment = segments[segments.length - 1].segment;
          const newStart = start - lastSegment.length;
          output.value = output.value.slice(0, newStart) + output.value.slice(end);
          output.selectionStart = output.selectionEnd = newStart;
        }
      } else {
        output.value = output.value.slice(0, start) + output.value.slice(end);
        output.selectionStart = output.selectionEnd = start;
      }
    } else if (key === 'delete') {
      output.value = '';
      output.selectionStart = output.selectionEnd = 0;
    } else {
      output.value = output.value.slice(0, start) + key + output.value.slice(end);
      output.selectionStart = output.selectionEnd = start + key.length;
    }
    output.focus();
  }
});
